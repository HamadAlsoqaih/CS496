<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS496 Study Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-shell">
    <div class="hero">
      <div>
        <p class="eyebrow">CS496 Study Website</p>
        <h1>Quantum, Agentic AI, and Blockchain</h1>
        <p class="hero-text">A complete, organized study website built from the uploaded course files. Track concepts, review diagrams, and use the mini quizzes to test yourself.</p>
      </div>
      <div class="hero-actions">
        <button id="themeToggle" class="secondary-btn" type="button">Dark mode</button>
        <button id="resetProgress" class="danger-btn" type="button">Reset progress</button>
      </div>
    </div>
    <section class="progress-panel" aria-label="Progress overview">
      <div class="progress-topline">
        <span>Overall course progress</span>
        <strong id="overallProgressText">0%</strong>
      </div>
      <div class="progress-track"><div id="overallProgressBar" class="progress-fill"></div></div>
      <div id="moduleProgressList" class="module-progress-list"></div>
    </section>
    <nav id="topNav" class="top-nav" aria-label="Main topics"></nav>
  </header>

  <main id="app" class="content-shell"></main>

  <dialog id="imageDialog" class="image-dialog">
    <button id="closeDialog" class="dialog-close" type="button">Close</button>
    <img id="dialogImage" alt="Expanded course diagram" />
    <p id="dialogCaption"></p>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
